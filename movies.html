<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieManager - Films</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-film"></i>
            <span>MovieManager</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="bi bi-speedometer2"></i> <span data-i18n="dashboard">Dashboard</span></a></li>
            <li><a href="movies.html" class="active"><i class="bi bi-film"></i> <span data-i18n="movies">Films</span></a></li>
            <li><a href="movies.html?favorites=true"><i class="bi bi-star-fill"></i> <span data-i18n="favorites">Favoris</span></a></li>
            <li><a href="movies.html?archived=true"><i class="bi bi-archive"></i> <span data-i18n="archives">Archives</span></a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-link d-md-none" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
                <a class="navbar-brand ms-3" href="dashboard.html">
                    <i class="bi bi-film text-primary"></i> MovieManager
                </a>
                <div class="ms-auto d-flex align-items-center">
                    <select class="form-select form-select-sm me-3" id="languageSelect" style="width: auto;">
                        <option value="fr">FR</option>
                        <option value="en">EN</option>
                        <option value="ar">AR</option>
                    </select>
                    <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
                        <i class="bi bi-box-arrow-right"></i> <span data-i18n="logout">Déconnexion</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Movies Content -->
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="pageTitle" data-i18n="movies">Films</h2>
                <button class="btn btn-primary" id="addMovieBtn" data-bs-toggle="modal" data-bs-target="#movieModal">
                    <i class="bi bi-plus-circle"></i> <span data-i18n="addMovie">Ajouter un film</span>
                </button>
            </div>

            <!-- Search Bar -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="searchInput" placeholder="Rechercher un film..." data-i18n-placeholder="searchPlaceholder">
                    </div>
                </div>
            </div>

            <!-- Movies Grid -->
            <div id="moviesContainer" class="row g-4">
                <!-- Movies will be loaded here -->
            </div>

            <!-- Pagination -->
            <nav aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center" id="pagination">
                    <!-- Pagination will be generated here -->
                </ul>
            </nav>
        </div>
    </div>

    <!-- Movie Modal (Add/Edit) -->
    <div class="modal fade" id="movieModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle" data-i18n="addMovie">Ajouter un film</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="movieForm">
                        <input type="hidden" id="movieId">
                        <div class="mb-3">
                            <label for="movieTitle" class="form-label" data-i18n="title">Titre</label>
                            <input type="text" class="form-control" id="movieTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="movieDescription" class="form-label" data-i18n="description">Description</label>
                            <textarea class="form-control" id="movieDescription" rows="4" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="movieReleaseDate" class="form-label" data-i18n="releaseDate">Date de sortie</label>
                                <input type="date" class="form-control" id="movieReleaseDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="movieRating" class="form-label" data-i18n="rating">Note</label>
                                <input type="number" class="form-control" id="movieRating" min="0" max="10" step="0.1" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="movieLanguage" class="form-label" data-i18n="language">Langue</label>
                                <input type="text" class="form-control" id="movieLanguage" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="moviePoster" class="form-label" data-i18n="poster">URL Poster</label>
                                <input type="url" class="form-control" id="moviePoster">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancel">Annuler</button>
                    <button type="button" class="btn btn-primary" id="saveMovieBtn" data-i18n="save">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Movie Detail Modal -->
    <div class="modal fade" id="movieDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailMovieTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-4">
                            <img id="detailMoviePoster" src="" alt="" class="img-fluid rounded mb-3">
                        </div>
                        <div class="col-md-8">
                            <p><strong data-i18n="description">Description:</strong></p>
                            <p id="detailMovieDescription"></p>
                            <div class="row mt-3">
                                <div class="col-md-6">
                                    <p><strong data-i18n="releaseDate">Date de sortie:</strong> <span id="detailMovieReleaseDate"></span></p>
                                    <p><strong data-i18n="rating">Note:</strong> <span id="detailMovieRating"></span></p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong data-i18n="language">Langue:</strong> <span id="detailMovieLanguage"></span></p>
                                    <p><strong>ID:</strong> <span id="detailMovieId"></span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="exportPdfBtn">
                        <i class="bi bi-file-pdf"></i> <span data-i18n="exportPdf">Exporter en PDF</span>
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="close">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
