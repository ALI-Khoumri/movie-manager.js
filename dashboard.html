<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieManager - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-film"></i>
            <span>MovieManager</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" class="active"><i class="bi bi-speedometer2"></i> <span data-i18n="dashboard">Dashboard</span></a></li>
            <li><a href="movies.html"><i class="bi bi-film"></i> <span data-i18n="movies">Films</span></a></li>
            <li><a href="movies.html?favorites=true"><i class="bi bi-star-fill"></i> <span data-i18n="favorites">Favoris</span></a></li>
            <li><a href="movies.html?archived=true"><i class="bi bi-archive"></i> <span data-i18n="archives">Archives</span></a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-link d-md-none" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
                <a class="navbar-brand ms-3" href="dashboard.html">
                    <i class="bi bi-film text-primary"></i> MovieManager
                </a>
                <div class="ms-auto d-flex align-items-center">
                    <select class="form-select form-select-sm me-3" id="languageSelect" style="width: auto;">
                        <option value="fr">FR</option>
                        <option value="en">EN</option>
                        <option value="ar">AR</option>
                    </select>
                    <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
                        <i class="bi bi-box-arrow-right"></i> <span data-i18n="logout">Déconnexion</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <div class="container-fluid p-4">
            <h2 class="mb-4" data-i18n="dashboard">Dashboard</h2>

            <!-- Statistics Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-6 col-lg-3">
                    <div class="card stat-card stat-primary">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2" data-i18n="totalMovies">Total Films</h6>
                                    <h3 class="mb-0" id="statTotalMovies">0</h3>
                                </div>
                                <div class="stat-icon">
                                    <i class="bi bi-film"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="card stat-card stat-success">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2" data-i18n="popularMovies">Films Populaires</h6>
                                    <h3 class="mb-0" id="statPopularMovies">0</h3>
                                </div>
                                <div class="stat-icon">
                                    <i class="bi bi-fire"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="card stat-card stat-warning">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2" data-i18n="archivedMovies">Films Archivés</h6>
                                    <h3 class="mb-0" id="statArchivedMovies">0</h3>
                                </div>
                                <div class="stat-icon">
                                    <i class="bi bi-archive"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="card stat-card stat-info">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2" data-i18n="favoriteMovies">Favoris</h6>
                                    <h3 class="mb-0" id="statFavoriteMovies">0</h3>
                                </div>
                                <div class="stat-icon">
                                    <i class="bi bi-star-fill"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Average Rating Card -->
            <div class="row mb-4">
                <div class="col-md-12">
                    <div class="card stat-card stat-secondary">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2" data-i18n="averageRating">Note Moyenne</h6>
                                    <h3 class="mb-0" id="statAverageRating">0.0</h3>
                                </div>
                                <div class="stat-icon">
                                    <i class="bi bi-star-half"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0" data-i18n="moviesByYear">Films par Année</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartByYear"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0" data-i18n="languages">Langues</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartLanguages"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0" data-i18n="releaseEvolution">Évolution des Sorties</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartEvolution"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0" data-i18n="favoritesVsArchived">Favoris vs Archivés</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartFavoritesArchived"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0" data-i18n="ratingsDistribution">Distribution des Notes</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="chartRatings"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
